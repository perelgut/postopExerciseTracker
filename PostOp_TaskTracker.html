<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>postopExerciseTracker — Project Task Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --border:    #2a2f3e;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --accent:    #3b82f6;

    --p1: #3b82f6;  --p1-bg: #1e3a5f;
    --p2: #10b981;  --p2-bg: #064e3b;
    --p3: #f59e0b;  --p3-bg: #451a03;
    --p4: #a78bfa;  --p4-bg: #2e1065;
    --p5: #f43f5e;  --p5-bg: #4c0519;

    --green:  #22c55e;  --green-bg:  #052e16;
    --yellow: #eab308;  --yellow-bg: #422006;
    --red:    #ef4444;  --red-bg:    #450a0a;
    --grey:   #6b7280;  --grey-bg:   #1f2937;

    --crit: #ef4444;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .header-left p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .header-stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--green);
    min-width: 40px;
    text-align: right;
  }

  /* ── PHASE SECTIONS ── */
  .phase-section { margin: 24px 32px 0; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    border-left: 3px solid;
  }
  .phase-header .phase-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .phase-header .phase-title {
    font-size: 0.9rem;
    font-weight: 600;
    flex: 1;
  }
  .phase-header .phase-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    opacity: 0.7;
  }

  /* ── TASK TABLE ── */
  .task-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .task-table thead tr {
    background: #1a1f2e;
  }
  .task-table thead th {
    padding: 8px 12px;
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .task-table thead th.center { text-align: center; }

  .task-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: #1e2335; }
  .task-row.crit-row { border-left: 2px solid var(--crit); }

  .task-row td {
    padding: 9px 12px;
    vertical-align: middle;
  }

  .task-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .task-id.crit { color: var(--crit); }

  .task-name {
    max-width: 380px;
    line-height: 1.4;
  }
  .task-name .crit-badge {
    display: inline-block;
    background: #450a0a;
    color: var(--crit);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .task-days {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    text-align: center;
    color: var(--muted);
    white-space: nowrap;
  }

  .task-deps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .task-sched {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    text-align: center;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .status-badge:hover { opacity: 0.8; }
  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-not-started  { background: var(--grey-bg);   color: var(--grey);   border: 1px solid #374151; }
  .status-not-started::before  { background: var(--grey); }
  .status-in-progress  { background: #1e3a5f;           color: #60a5fa;       border: 1px solid #1d4ed8; }
  .status-in-progress::before  { background: #60a5fa; }
  .status-early        { background: var(--green-bg);   color: var(--green);  border: 1px solid #166534; }
  .status-early::before        { background: var(--green); }
  .status-on-time      { background: var(--green-bg);   color: var(--green);  border: 1px solid #166534; }
  .status-on-time::before      { background: var(--green); }
  .status-1-day-late   { background: var(--yellow-bg);  color: var(--yellow); border: 1px solid #854d0e; }
  .status-1-day-late::before   { background: var(--yellow); }
  .status-late         { background: var(--red-bg);     color: var(--red);    border: 1px solid #991b1b; }
  .status-late::before         { background: var(--red); }

  /* ── COMPLETION DATE INPUT ── */
  .date-input {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    padding: 3px 7px;
    width: 120px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .date-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .date-input:hover { border-color: #4b5563; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 560px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .modal .modal-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    line-height: 1.4;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .modal-field .val {
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .modal-field .mono-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
  }
  .modal-field .prompt-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 0.78rem;
    line-height: 1.6;
    color: #cbd5e1;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .btn-close:hover { color: var(--text); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 12px 32px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .filter-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-right: 4px;
  }

  /* ── FOOTER ── */
  .page-footer {
    padding: 16px 32px;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    border-top: 1px solid var(--border);
    margin-top: 32px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header, .phase-section, .filter-bar, .legend, .progress-bar-wrap { padding-left: 16px; padding-right: 16px; }
    .phase-section { margin-left: 16px; margin-right: 16px; }
    .task-deps, .task-sched { display: none; }
    .task-name { max-width: 200px; }
    .date-input { width: 100px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>postopExerciseTracker</h1>
    <p>Project Task Tracker &mdash; v1.0 &mdash; Based on Project Plan v1.0</p>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<div class="progress-bar-wrap">
  <span style="font-size:0.72rem;color:var(--muted);white-space:nowrap;">Overall Progress</span>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>

<div class="legend">
  <span class="legend-item"><span class="status-badge status-not-started">Not Started</span></span>
  <span class="legend-item"><span class="status-badge status-in-progress">In Progress</span></span>
  <span class="legend-item"><span class="status-badge status-early">Early / On Time</span> <span style="font-size:0.65rem">(green)</span></span>
  <span class="legend-item"><span class="status-badge status-1-day-late">1 Day Late</span> <span style="font-size:0.65rem">(yellow)</span></span>
  <span class="legend-item"><span class="status-badge status-late">Late &gt;1 Day</span> <span style="font-size:0.65rem">(red)</span></span>
  <span class="legend-item" style="margin-left:8px">
    <span style="display:inline-block;width:10px;height:10px;background:var(--crit);border-radius:2px"></span>
    <span>Critical path task</span>
  </span>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All (42)</button>
  <button class="filter-btn" data-filter="1" onclick="setFilter(this,'1')">Phase 1</button>
  <button class="filter-btn" data-filter="2" onclick="setFilter(this,'2')">Phase 2</button>
  <button class="filter-btn" data-filter="3" onclick="setFilter(this,'3')">Phase 3</button>
  <button class="filter-btn" data-filter="4" onclick="setFilter(this,'4')">Phase 4</button>
  <button class="filter-btn" data-filter="5" onclick="setFilter(this,'5')">Phase 5</button>
  <button class="filter-btn" data-filter="crit" onclick="setFilter(this,'crit')">⚑ Critical Path</button>
  <button class="filter-btn" data-filter="incomplete" onclick="setFilter(this,'incomplete')">Incomplete</button>
  <button class="filter-btn" data-filter="late" onclick="setFilter(this,'late')">⚠ Late</button>
</div>

<div id="phaseSections"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="btn-close" onclick="closeModalDirect()">✕</button>
    <h2 id="modalId"></h2>
    <div class="modal-title" id="modalName"></div>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="markInProgress()">Mark In Progress</button>
      <button class="btn btn-ghost" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<div class="page-footer">
  <span id="footerLeft">postopExerciseTracker &mdash; Task Tracker &mdash; Data stored in browser localStorage</span>
  <span id="footerRight"></span>
</div>

<script>
// ── TASK DATA ──────────────────────────────────────────────────────────────────
const PHASES = {
  1: { name: "Phase 1 — Project Setup & Infrastructure", color: "#3b82f6", bg: "#1e3a5f" },

  3: { name: "Phase 3 — UI: Core Screens",              color: "#f59e0b", bg: "#451a03" },
  4: { name: "Phase 4 — Integration, Polish & Should Haves", color: "#a78bfa", bg: "#2e1065" },
  5: { name: "Phase 5 — Release & Handover",            color: "#f43f5e", bg: "#4c0519" },
};

const TASKS = [
  {id:"T1.1",ph:1,name:"Create GitHub repository (postopExerciseTracker, public)",days:0.5,deps:[],crit:true,reqs:"M-24",sched:{s:0,e:0.5}},
  {id:"T1.2",ph:1,name:"Set up GitHub Pages + deploy.yml GitHub Actions workflow",days:1,deps:["T1.1"],crit:true,reqs:"M-24",sched:{s:0.5,e:1.5}},
  {id:"T1.3",ph:1,name:"Create Firebase project (perelgut@gmail.com)",days:0.5,deps:["T1.1"],crit:true,reqs:"M-15,M-16",sched:{s:0.5,e:1}},

  {id:"T2.7",ph:2,name:"Unit test: scheduler.js (all 7 days, verify correct exercise sets)",days:1,deps:["T2.5"],crit:true,reqs:"M-10",sched:{s:4,e:5}},

  {id:"T3.1",ph:3,name:"Implement index.html shell, css/styles.css — mobile-first layout",days:1,deps:["T1.8"],crit:true,reqs:"M-23",sched:{s:1,e:2}},
  {id:"T3.2",ph:3,name:"Implement ui.js — screen switching, toast notifications, loading spinner",days:1,deps:["T3.1"],crit:true,reqs:"Spec Sec 5",sched:{s:2,e:3}},

  {id:"T3.5",ph:3,name:"Implement screen-log: exercise cards, expand/collapse, frequency badges",days:2,deps:["T3.3","T2.1"],crit:true,reqs:"M-01 to M-05",sched:{s:8.5,e:10.5}},
  {id:"T3.6",ph:3,name:"Implement screen-log: time-of-day selector with device clock pre-selection",days:1,deps:["T3.5"],crit:false,reqs:"M-09",sched:{s:10.5,e:11.5}},

// ── STORAGE ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'postopTracker_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let taskData = loadData();

function getTaskRecord(id) {
  return taskData[id] || { status: 'not-started', completedDate: '', startedDate: '' };
}

function setTaskRecord(id, updates) {
  taskData[id] = { ...getTaskRecord(id), ...updates };
  saveData(taskData);
}

// ── STATUS CALCULATION ─────────────────────────────────────────────────────────
// Project start date = today if not set
function getProjectStart() {
  const stored = localStorage.getItem('postopTracker_projectStart');
  if (stored) return new Date(stored);
  const today = new Date();
  today.setHours(0,0,0,0);
  localStorage.setItem('postopTracker_projectStart', today.toISOString());
  return today;
}

const PROJECT_START = getProjectStart();

function dayTargetDate(days) {
  const d = new Date(PROJECT_START);
  d.setDate(d.getDate() + Math.ceil(days));
  return d;
}

function calcStatus(task, record) {
  if (record.status === 'in-progress') return 'in-progress';
  if (!record.completedDate) return 'not-started';

  const completed = new Date(record.completedDate);
  completed.setHours(0,0,0,0);
  const target = dayTargetDate(task.sched.e);
  target.setHours(0,0,0,0);

  const diffDays = Math.round((completed - target) / 86400000);
  if (diffDays <= 0) return 'early';
  if (diffDays === 1) return '1-day-late';
  return 'late';
}

function statusLabel(s) {
  return { 'not-started':'Not Started','in-progress':'In Progress','early':'Done ✓','on-time':'Done ✓','1-day-late':'1 Day Late','late':'Late' }[s] || s;
}
function statusClass(s) {
  return { 'not-started':'status-not-started','in-progress':'status-in-progress','early':'status-early','on-time':'status-on-time','1-day-late':'status-1-day-late','late':'status-late' }[s] || 'status-not-started';
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentModalId = null;

function render() {
  updateHeader();
  renderPhases();
  updateProgressBar();
}

function updateHeader() {
  const done = TASKS.filter(t => { const r=getTaskRecord(t.id); const s=calcStatus(t,r); return s==='early'||s==='on-time'||s==='1-day-late'||s==='late'; }).length;
  const inProg = TASKS.filter(t => getTaskRecord(t.id).status === 'in-progress').length;
  const late = TASKS.filter(t => { const r=getTaskRecord(t.id); return calcStatus(t,r)==='late'||calcStatus(t,r)==='1-day-late'; }).length;
  const crit = TASKS.filter(t => t.crit).length;

  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill"><span class="dot" style="background:#6b7280"></span>${TASKS.length} Tasks</div>
    <div class="stat-pill"><span class="dot" style="background:#22c55e"></span>${done} Done</div>
    <div class="stat-pill"><span class="dot" style="background:#60a5fa"></span>${inProg} In Progress</div>
    ${late > 0 ? `<div class="stat-pill"><span class="dot" style="background:#ef4444"></span>${late} Late</div>` : ''}
    <div class="stat-pill"><span class="dot" style="background:#ef4444"></span>${crit} Critical</div>
  `;
  document.getElementById('footerRight').textContent = `Last updated: ${new Date().toLocaleString()}`;
}

function updateProgressBar() {
  const done = TASKS.filter(t => { const r=getTaskRecord(t.id); const s=calcStatus(t,r); return ['early','on-time','1-day-late','late'].includes(s); }).length;
  const pct = Math.round((done / TASKS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function filterTasks(tasks) {
  if (currentFilter === 'all') return tasks;
  if (currentFilter === 'crit') return tasks.filter(t => t.crit);
  if (currentFilter === 'incomplete') return tasks.filter(t => {
    const s = calcStatus(t, getTaskRecord(t.id));
    return !['early','on-time','1-day-late','late'].includes(s);
  });
  if (currentFilter === 'late') return tasks.filter(t => {
    const s = calcStatus(t, getTaskRecord(t.id));
    return s === 'late' || s === '1-day-late';
  });
  return tasks.filter(t => String(t.ph) === currentFilter);
}

function renderPhases() {
  const container = document.getElementById('phaseSections');
  container.innerHTML = '';

  const phases = currentFilter === 'all' || currentFilter === 'crit' || currentFilter === 'incomplete' || currentFilter === 'late'
    ? [1,2,3,4,5]
    : [parseInt(currentFilter)];

  phases.forEach(phNum => {
    const ph = PHASES[phNum];
    const tasks = filterTasks(TASKS.filter(t => t.ph === phNum));
    if (tasks.length === 0) return;

    const phaseDone = tasks.filter(t => { const s=calcStatus(t,getTaskRecord(t.id)); return ['early','on-time','1-day-late','late'].includes(s); }).length;
    const totalPhase = TASKS.filter(t => t.ph === phNum).length;

    const section = document.createElement('div');
    section.className = 'phase-section';

    section.innerHTML = `
      <div class="phase-header" style="background:${ph.bg}22;border-color:${ph.color}">
        <span class="phase-num" style="color:${ph.color}">Phase ${phNum}</span>
        <span class="phase-title" style="color:${ph.color}">${ph.name.replace(/Phase \d+ — /,'')}</span>
        <span class="phase-meta" style="color:${ph.color}">${phaseDone}/${totalPhase} done</span>
      </div>
      <table class="task-table">
        <thead>
          <tr>
            <th style="width:60px">ID</th>
            <th>Task</th>
            <th class="center" style="width:55px">Days</th>
            <th class="center" style="width:120px">Depends On</th>
            <th class="center" style="width:100px">Scheduled</th>
            <th class="center" style="width:130px">Completed</th>
            <th class="center" style="width:115px">Status</th>
          </tr>
        </thead>
        <tbody id="tbody-ph${phNum}"></tbody>
      </table>
    `;
    container.appendChild(section);

    const tbody = section.querySelector(`#tbody-ph${phNum}`);
    tasks.forEach(t => {
      const record = getTaskRecord(t.id);
      const status = calcStatus(t, record);
      const tr = document.createElement('tr');
      tr.className = `task-row${t.crit ? ' crit-row' : ''}`;
      tr.onclick = () => openModal(t.id);
      tr.innerHTML = `
        <td class="task-id ${t.crit?'crit':''}" style="color:${t.crit?'var(--crit)':ph.color}">${t.id}</td>
        <td class="task-name">
          ${t.name}
          ${t.crit ? '<span class="crit-badge">CRIT</span>' : ''}
        </td>
        <td class="task-days">${t.days}d</td>
        <td class="task-deps">${t.deps.join(', ')||'—'}</td>
        <td class="task-sched">D${t.sched.s}→D${t.sched.e}</td>
        <td onclick="event.stopPropagation()">
          <input type="date" class="date-input" id="date-${t.id}"
            value="${record.completedDate||''}"
            onchange="setCompletedDate('${t.id}', this.value)"
          >
        </td>
        <td class="center" style="text-align:center">
          <span class="status-badge ${statusClass(status)}" onclick="event.stopPropagation();cycleStatus('${t.id}')">
            ${statusLabel(status)}
          </span>
        </td>
      `;
      tbody.appendChild(tr);
    });
  });
}

function setCompletedDate(id, val) {
  setTaskRecord(id, { completedDate: val, status: val ? 'done' : getTaskRecord(id).status });
  render();
}

function cycleStatus(id) {
  const record = getTaskRecord(id);
  const current = record.status;
  let next;
  if (current === 'not-started') next = 'in-progress';
  else if (current === 'in-progress') next = 'not-started';
  else next = current; // completed status controlled by date
  setTaskRecord(id, { status: next });
  render();
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal(id) {
  const t = TASKS.find(t => t.id === id);
  if (!t) return;
  currentModalId = id;
  const ph = PHASES[t.ph];
  const record = getTaskRecord(id);
  const status = calcStatus(t, record);

  document.getElementById('modalId').textContent = t.id;
  document.getElementById('modalId').style.color = t.crit ? 'var(--crit)' : ph.color;
  document.getElementById('modalName').textContent = t.name;

  const target = dayTargetDate(t.sched.e);

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field">
      <label>Phase</label>
      <div class="val" style="color:${ph.color}">${ph.name}</div>
    </div>
    <div class="modal-field">
      <label>Requirement IDs</label>
      <div class="val mono-val">${t.reqs}</div>
    </div>
    <div class="modal-field">
      <label>Duration / Scheduled</label>
      <div class="val mono-val">${t.days} day(s) &mdash; Day ${t.sched.s} → Day ${t.sched.e} &mdash; Target: ${target.toLocaleDateString('en-CA')}</div>
    </div>
    <div class="modal-field">
      <label>Dependencies</label>
      <div class="val mono-val">${t.deps.join(', ')||'None — can start immediately'}</div>
    </div>
    <div class="modal-field">
      <label>Critical Path</label>
      <div class="val" style="color:${t.crit?'var(--crit)':'var(--muted)'}">${t.crit?'⚑ YES — delays this task delay the entire project':'No'}</div>
    </div>
    <div class="modal-field">
      <label>Current Status</label>
      <div class="val"><span class="status-badge ${statusClass(status)}">${statusLabel(status)}</span></div>
    </div>
    <div class="modal-field">
      <label>Completion Date</label>
      <input type="date" class="date-input" style="width:160px" id="modal-date-${id}"
        value="${record.completedDate||''}"
        onchange="setCompletedDate('${id}', this.value)">
    </div>
    <div class="modal-field">
      <label>AI Implementation Prompt</label>
      <div class="prompt-box">${AI_PROMPTS[id]||'See Project Plan document for full prompt.'}</div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModalId = null;
}

function markInProgress() {
  if (!currentModalId) return;
  setTaskRecord(currentModalId, { status: 'in-progress' });
  render();
  closeModalDirect();
}

// ── FILTER ─────────────────────────────────────────────────────────────────────
function setFilter(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = val;
  render();
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// ── INIT ───────────────────────────────────────────────────────────────────────
render();
</script>
