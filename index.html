
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d4f6e">
  <title>Post-Op Exercise Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/table.css">
  <link rel="icon" href="data:,">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       SCREEN: Loading / Initialisation
  ════════════════════════════════════════════════════ -->
  <div id="screen-loading" class="screen screen-loading-state">
    <div class="loading-inner">
      <div class="loading-logo">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
          <circle cx="28" cy="28" r="26" stroke="#0d4f6e" stroke-width="2.5" fill="none" opacity="0.15"/>
          <circle cx="28" cy="28" r="26" stroke="#0d4f6e" stroke-width="2.5" fill="none"
            stroke-dasharray="163" stroke-dashoffset="40" class="spinner-arc"/>
          <path d="M20 28 L25 33 L36 22" stroke="#0d4f6e" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" class="spinner-check"/>
        </svg>
      </div>
      <p class="loading-label">Connecting…</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SCREEN: Today's Exercises (Log)
  ════════════════════════════════════════════════════ -->
  <div id="screen-log" class="screen" style="display:none">

    <!-- App Header -->
    <header class="app-header">
      <div class="header-meta">
        <span id="hdr-day-label" class="day-badge">Day —</span>
        <span id="hdr-date" class="hdr-date">—</span>
      </div>
      <div class="header-title-row">
        <h1 class="app-title">Post-Op Exercises</h1>
        <span id="hdr-completion" class="completion-badge completion-badge--pending" aria-label="Today's status">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
      </div>
    </header>

    <!-- Offline Banner -->
    <div id="offline-banner" class="offline-banner" style="display:none" role="alert">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M10 3v8M10 15v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5" fill="none"/>
      </svg>
      Offline — changes will sync when connected
    </div>

    <!-- Screen Body -->
    <main class="screen-body" id="log-body">

      <!-- Time-of-day selector -->
      <div class="tod-bar">
        <label for="time-of-day" class="tod-label">Time of day</label>
        <select id="time-of-day" class="tod-select">
          <option value="Early Morning">Early Morning (6–9am)</option>
          <option value="Morning">Morning (9am–12pm)</option>
          <option value="Lunch">Lunch (12–1pm)</option>
          <option value="Early Afternoon">Early Afternoon (1–3pm)</option>
          <option value="Afternoon">Afternoon (3–5pm)</option>
          <option value="Early Evening">Early Evening (5–7pm)</option>
          <option value="Evening">Evening (7–9pm)</option>
          <option value="Late">Late (after 9pm)</option>
        </select>
      </div>

      <!-- Exercise cards injected here by logger.js -->
      <div id="exercise-list" class="exercise-list" role="list"></div>

    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SCREEN: 30-Day History
  ════════════════════════════════════════════════════ -->
  <div id="screen-history" class="screen" style="display:none">

    <header class="app-header">
      <div class="header-meta">
        <span class="hdr-date">Last 30 days</span>
      </div>
      <div class="header-title-row">
        <h1 class="app-title">History</h1>
      </div>
    </header>

    <main class="screen-body screen-body--flush">
      <div id="history-table-wrap" class="history-table-wrap">
        <!-- Table injected by history.js -->
        <p class="empty-state">Loading history…</p>
      </div>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════
       SCREEN: Manage Progressions
  ════════════════════════════════════════════════════ -->
  <div id="screen-progressions" class="screen" style="display:none">

    <header class="app-header">
      <div class="header-meta">
        <span class="hdr-date">All exercises</span>
      </div>
      <div class="header-title-row">
        <h1 class="app-title">Progressions</h1>
      </div>
    </header>

    <main class="screen-body" id="progressions-body">
      <!-- Progression cards injected by progression.js -->
      <div id="progression-list" class="exercise-list" role="list"></div>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════
       BOTTOM NAVIGATION
  ════════════════════════════════════════════════════ -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn nav-btn--active" data-screen="screen-log" aria-label="Today's exercises" aria-current="page">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
      </svg>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" data-screen="screen-history" aria-label="30-day history">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M3 9h18" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M7 13h4M7 17h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">History</span>
    </button>
    <button class="nav-btn" data-screen="screen-progressions" aria-label="Manage progressions">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 18h4M4 13h8M4 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="18" cy="8" r="2.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M18 10.5V16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Progress</span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════════════
       TOAST NOTIFICATION
  ════════════════════════════════════════════════════ -->
  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ═══════════════════════════════════════════════════
       APPLICATION ENTRY POINT
  ════════════════════════════════════════════════════ -->
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/logger.js"></script>
  <script type="module" src="js/history.js"></script>
  <script type="module" src="js/time-of-day.js"></script>

</body>
</html>
