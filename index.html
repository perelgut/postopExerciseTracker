<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post-Op Exercise Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="screen-loading">Loading...</div>
  <div id="screen-log"     style="display:none"></div>
  <div id="screen-history" style="display:none"></div>
  <div id="screen-progressions" style="display:none"></div>

  <script type="module">
    const { auth, db }           = await import('./js/firebase-config.js');
    const { initAuth, getCurrentUID } = await import('./js/auth.js');
    const { saveProfile, getProfile,
            saveLogEntry, getLog,
            getProgressions, updateProgression,
            todayStr }           = await import('./js/firestore.js');

    window._test = {
      auth, db, initAuth, getCurrentUID,
      saveProfile, getProfile,
      saveLogEntry, getLog,
      getProgressions, updateProgression,
      todayStr
    };

    console.log('Firebase modules loaded. Run integration tests via window._test');
  </script>

</body>
</html>
